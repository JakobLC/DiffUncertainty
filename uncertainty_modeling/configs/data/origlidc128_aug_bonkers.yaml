# @package _global_
data:
  _target_: uncertainty_modeling.data.torch_dataloader.BaseDataModule
  name: "origlidc128"
  nickname: "origlidc128"
  data_input_dir: "/home/jloch/Desktop/diff/luzern/values_datasets/origlidc128"
  num_classes: 2
  ignore_index: -1
  num_workers: 8
  batch_size: 32
  val_batch_size: 32
  data_fold_id: 0
  evaluate_training_data: true
  evaluate_all_raters: true
  single_rater: false
  validation_ratio: 0.1
  split_name: "ood_aug"
  dataset:
    _target_: uncertainty_modeling.data.lidc2d_dataset.MultiRater2DDataset
    splits_path: "${data.data_input_dir}/splits/${data.split_name}/firstCycle/splits.pkl"
  augmentations:
    height: 128
    width: 128
    augment_mult: 1.0
    apply_mult_keys: []
    TRAIN:
        - Compose:
            transforms:
            - HorizontalFlip:
                p: 0.5
            - Rotate:
                limit: 45
                border_mode: 0
                mask_value: 0
                p: 0.5
            - RandomScale:
                scale_limit: [-0.4, 0.4]
                p: 0.5
            - Affine:
                scale: 1.0
                translate_percent: 0.0
                rotate: 0.0
                shear: {x: [-30.0, 30.0], y: [-30.0, 30.0]}
                fit_output: false
                mode: 0
                cval: 0
                cval_mask: 0
                p: 0.5
            - ElasticTransform:
                alpha: 200
                sigma: 10
                alpha_affine: 0
                p: 0.5
            - PadIfNeeded:
                min_height: 128
                min_width: 128
                border_mode: 0
                mask_value: 0
            - CenterCrop:
                height: 128
                width: 128
            - GaussNoise:
                var_limit: [0.0, 0.2]
                p: 0.5
                per_channel: false
            - ChannelShuffle:
                p: 0.3
            - HueSaturationValue:
                hue_shift_limit: 0
                sat_shift_limit: 0
                val_shift_limit: [-0.3, 0.3]
                p: 0.5
            - MotionBlur:
                blur_limit: [3,15]
                p: 0.5
            - GaussianBlur:
                blur_limit: [3,11]
                p: 0.5
            - SampleNormalize:
                eps: 1e-6
            - ToTensorV2:
    VALIDATION:
      - Compose:
          transforms:
            - SampleNormalize:
                eps: 1e-6
            - ToTensorV2:
    TEST: ${data.augmentations.VALIDATION}