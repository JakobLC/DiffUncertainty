    data: [ "chaksu128" ]
  exp_name: "chaksu128"
  naming_scheme_version: "{pred_model}_{eu}_{seed1}/e500_ema"
  aggregations: [ "all" ]
  fold: 0
  rank: 5
  image_ending: ".png"
  unc_ending: ".tif"
  n_reference_segs: 5
  only_pu: false
  evaluate_training_data: ${evaluate_training_data}
